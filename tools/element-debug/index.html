<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenDocKit Element Debug</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
      }

      header {
        padding: 10px 20px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 20;
      }

      header h1 { font-size: 16px; font-weight: 600; color: #e94560; }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        padding: 5px 12px;
        border: 1px solid #0f3460;
        border-radius: 5px;
        background: #16213e;
        color: #e0e0e0;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
      }
      .btn:hover { background: #0f3460; border-color: #e94560; }
      .btn-primary { background: #e94560; border-color: #e94560; color: #fff; }
      .btn-primary:hover { background: #c73550; }
      .btn:disabled { opacity: 0.4; cursor: default; }

      .file-input { display: none; }

      /* Summary bar */
      #summary-bar {
        padding: 8px 20px;
        background: #111827;
        border-bottom: 1px solid #0f3460;
        font-size: 11px;
        color: #888;
        display: none;
        gap: 20px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        position: sticky;
        top: 42px;
        z-index: 19;
      }
      #summary-bar.visible { display: flex; }
      .stat { display: flex; gap: 4px; }
      .stat-label { color: #666; }
      .stat-value { color: #e0e0e0; font-weight: 600; }
      .stat-value.good { color: #4caf50; }
      .stat-value.warn { color: #ff9800; }
      .stat-value.bad { color: #f44336; }

      /* Slides container — vertical scroll of side-by-side pairs */
      #slides-container {
        padding: 24px;
        max-width: 1800px;
        margin: 0 auto;
      }

      .slide-pair {
        margin-bottom: 32px;
        background: #111827;
        border: 1px solid #0f3460;
        border-radius: 8px;
        overflow: hidden;
      }

      .slide-pair-header {
        padding: 8px 16px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        cursor: pointer;
      }
      .slide-pair-header:hover { background: #1a2744; }

      .slide-num { color: #e94560; font-weight: 700; font-size: 14px; min-width: 70px; }
      .slide-stats { color: #888; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
      .slide-worst { font-weight: 600; margin-left: auto; }

      .slide-pair-body {
        display: flex;
        gap: 0;
      }

      .slide-pane {
        flex: 1;
        position: relative;
        min-width: 0;
      }
      .slide-pane + .slide-pane { border-left: 1px solid #0f3460; }

      .slide-pane-label {
        padding: 4px 10px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #666;
        background: #0d1117;
        border-bottom: 1px solid #0f3460;
      }
      .slide-pane-label .badge {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 9px;
        margin-right: 4px;
      }
      .badge.pptx { background: #1e3a5f; color: #93c5fd; }
      .badge.pdf { background: #3d1a00; color: #fca5a5; }

      .slide-canvas-wrap {
        position: relative;
        background: #0d1117;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }

      .slide-canvas-wrap canvas.render-canvas {
        width: 100%;
        height: auto;
        display: block;
        background: #fff;
      }

      .slide-canvas-wrap canvas.overlay-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        pointer-events: none;
      }

      /* Detail panel — fixed right side */
      #detail-panel {
        position: fixed;
        right: 16px;
        top: 100px;
        width: 340px;
        max-height: calc(100vh - 120px);
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        overflow: hidden;
        z-index: 30;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      #detail-panel.visible { display: flex; }

      .detail-header {
        padding: 10px 12px;
        border-bottom: 1px solid #0f3460;
        font-size: 12px;
      }
      .detail-header .element-type { color: #e94560; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
      .detail-header .element-id { color: #666; font-size: 10px; font-family: 'SF Mono', 'Fira Code', monospace; margin-top: 2px; }
      .detail-header .match-info { color: #888; font-size: 11px; margin-top: 4px; }
      .detail-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: #666; font-size: 18px; cursor: pointer; }
      .detail-close:hover { color: #e94560; }

      .delta-list { flex: 1; overflow-y: auto; padding: 8px 0; }
      .delta-row {
        display: flex;
        align-items: center;
        padding: 4px 12px;
        font-size: 11px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        border-bottom: 1px solid #0a0f1a;
      }
      .delta-row:hover { background: #111827; }
      .delta-prop { flex: 1; color: #bbb; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .delta-values { display: flex; gap: 8px; align-items: center; font-size: 10px; }
      .delta-val { color: #888; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .delta-arrow { color: #555; }
      .delta-sev { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
      .sev-match { background: #4caf50; }
      .sev-minor { background: #ffeb3b; }
      .sev-major { background: #ff9800; }
      .sev-critical { background: #f44336; }

      .empty-state {
        padding: 60px 40px;
        text-align: center;
        color: #555;
        font-size: 14px;
      }

      footer {
        padding: 8px 20px;
        background: #16213e;
        border-top: 1px solid #0f3460;
        font-size: 11px;
        color: #666;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        bottom: 0;
        z-index: 20;
      }
      #status { color: #888; }
      .severity-legend { display: flex; gap: 12px; margin-left: auto; }
      .legend-item { display: flex; align-items: center; gap: 4px; }

      .progress-bar {
        height: 3px;
        background: #0f3460;
        position: sticky;
        top: 42px;
        z-index: 18;
      }
      .progress-bar-fill {
        height: 100%;
        background: #e94560;
        transition: width 0.3s;
        width: 0%;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Element Debug</h1>
      <div class="controls">
        <button id="btn-pptx" class="btn btn-primary">Load PPTX</button>
        <input id="input-pptx" class="file-input" type="file" accept=".pptx" />
        <button id="btn-pdf" class="btn btn-primary">Load PDF</button>
        <input id="input-pdf" class="file-input" type="file" accept=".pdf" />
        <button id="btn-run" class="btn" disabled>Run All Slides</button>
      </div>
    </header>

    <div id="summary-bar">
      <div class="stat"><span class="stat-label">Total Matched:</span> <span id="stat-matched" class="stat-value">-</span></div>
      <div class="stat"><span class="stat-label">Unmatched PPTX:</span> <span id="stat-unmatched-a" class="stat-value">-</span></div>
      <div class="stat"><span class="stat-label">Unmatched PDF:</span> <span id="stat-unmatched-b" class="stat-value">-</span></div>
      <div class="stat"><span class="stat-label">Avg Pos:</span> <span id="stat-pos" class="stat-value">-</span></div>
      <div class="stat"><span class="stat-label">Font:</span> <span id="stat-font" class="stat-value">-</span></div>
      <div class="stat"><span class="stat-label">Color:</span> <span id="stat-color" class="stat-value">-</span></div>
    </div>

    <div class="progress-bar" id="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>

    <div id="slides-container">
      <div class="empty-state" id="empty-state">Load a PPTX and PDF file, then click "Run All Slides"</div>
    </div>

    <div id="detail-panel">
      <button class="detail-close" id="detail-close">&times;</button>
      <div class="detail-header">
        <div class="element-type" id="detail-type">-</div>
        <div class="element-id" id="detail-id">-</div>
        <div class="match-info" id="detail-match">Click an element to inspect</div>
      </div>
      <div class="delta-list" id="delta-list"></div>
    </div>

    <footer>
      <span id="status">Ready</span>
      <div class="severity-legend">
        <div class="legend-item"><span class="delta-sev sev-match"></span>Match</div>
        <div class="legend-item"><span class="delta-sev sev-minor"></span>Minor</div>
        <div class="legend-item"><span class="delta-sev sev-major"></span>Major</div>
        <div class="legend-item"><span class="delta-sev sev-critical"></span>Critical</div>
      </div>
    </footer>

    <script type="module" src="./debug-viewer.ts"></script>
  </body>
</html>
