<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenDocKit Viewer</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 24px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
        position: sticky;
        top: 0;
        z-index: 20;
      }

      header h1 {
        font-size: 18px;
        font-weight: 600;
        color: #e94560;
        letter-spacing: 0.5px;
      }

      .file-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-left: auto;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border: 1px solid #0f3460;
        border-radius: 6px;
        background: #16213e;
        color: #e0e0e0;
        font-size: 13px;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
        user-select: none;
      }

      .btn:hover {
        background: #0f3460;
        border-color: #e94560;
      }

      .btn-primary {
        background: #e94560;
        border-color: #e94560;
        color: #fff;
      }

      .btn-primary:hover {
        background: #c73550;
      }

      .btn-sm {
        padding: 3px 10px;
        font-size: 11px;
        margin-left: auto;
      }

      #file-input {
        display: none;
      }

      /* Drop zone */
      #drop-zone {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow-y: auto;
      }

      #drop-zone.empty {
        cursor: pointer;
        justify-content: center;
      }

      #drop-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(233, 69, 96, 0.15);
        border: 3px dashed #e94560;
        border-radius: 12px;
        z-index: 10;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: #e94560;
        font-weight: 600;
        pointer-events: none;
      }

      #drop-zone.drag-over #drop-overlay {
        display: flex;
      }

      .empty-state {
        text-align: center;
        color: #888;
      }

      .empty-state p {
        margin-top: 8px;
        font-size: 14px;
      }

      .empty-state .hint {
        font-size: 13px;
        color: #666;
        margin-top: 16px;
      }

      /* Slides container */
      #slides-container {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        padding: 32px 24px;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }

      #slides-container.visible {
        display: flex;
      }

      .slide-wrapper {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .slide-label {
        display: flex;
        align-items: center;
        width: 100%;
        max-width: 960px;
        padding: 8px 4px;
        font-size: 13px;
        color: #999;
        font-weight: 500;
      }

      .slide-image {
        max-width: 960px;
        width: 100%;
        height: auto;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        border-radius: 4px;
        background: #fff;
      }

      /* Skeleton placeholder while slide is rendering */
      .slide-skeleton {
        max-width: 960px;
        width: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, #2a2a3e 25%, #33334a 50%, #2a2a3e 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* Footer */
      footer {
        padding: 10px 24px;
        background: #16213e;
        border-top: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
        position: sticky;
        bottom: 0;
        z-index: 20;
      }

      .slide-info {
        font-size: 12px;
        color: #777;
        margin-left: auto;
      }

      #status {
        font-size: 12px;
        color: #777;
      }

      /* Error display */
      .error-banner {
        display: none;
        padding: 10px 24px;
        background: #3d0000;
        border-bottom: 1px solid #e94560;
        color: #ff8888;
        font-size: 13px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .error-banner.visible {
        display: block;
      }

      /* Loading spinner */
      .loading-indicator {
        display: none;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #bbb;
      }

      .loading-indicator.visible {
        display: inline-flex;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #333;
        border-top-color: #e94560;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      kbd {
        display: inline-block;
        padding: 1px 5px;
        font-size: 11px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        background: #0f3460;
        border: 1px solid #1a4a7a;
        border-radius: 3px;
        color: #aaa;
      }

      /* Toggle button active state (thumbs, perf) */
      .btn.active {
        background: #0f3460;
        border-color: #3b82f6;
      }

      /* Inspector mode */
      .btn-inspector.active {
        background: #e94560;
        border-color: #e94560;
        color: #fff;
      }

      .slide-wrapper.inspector-active .slide-image {
        cursor: crosshair;
      }

      .slide-image-container {
        position: relative;
        max-width: 960px;
        width: 100%;
      }

      .inspector-highlight {
        position: absolute;
        border: 2px solid #e94560;
        background: rgba(233, 69, 96, 0.12);
        pointer-events: none;
        z-index: 5;
        transition: all 0.1s ease;
      }

      .inspector-tooltip {
        position: absolute;
        z-index: 10;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        color: #e0e0e0;
        pointer-events: none;
        white-space: nowrap;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        max-width: 400px;
      }

      .inspector-tooltip .tooltip-kind {
        color: #e94560;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
      }

      .inspector-tooltip .tooltip-name {
        font-weight: 500;
        margin-top: 2px;
      }

      .inspector-tooltip .tooltip-detail {
        color: #999;
        font-size: 11px;
        margin-top: 4px;
        font-family: 'SF Mono', 'Fira Code', monospace;
      }

      .inspector-tooltip .tooltip-text {
        color: #bbb;
        font-size: 11px;
        margin-top: 4px;
        white-space: normal;
        max-width: 350px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .inspector-tooltip .tooltip-layer {
        color: #666;
        font-size: 10px;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Edit mode */
      .btn-edit.active {
        background: #3b82f6;
        border-color: #3b82f6;
        color: #fff;
      }

      .slide-wrapper.edit-active .slide-image {
        cursor: pointer;
      }

      .edit-highlight {
        position: absolute;
        border: 2px solid #3b82f6;
        background: rgba(59, 130, 246, 0.1);
        pointer-events: none;
        z-index: 5;
        transition: all 0.1s ease;
      }

      .edit-handle {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #3b82f6;
        border: 1px solid #fff;
        border-radius: 2px;
        pointer-events: none;
        z-index: 6;
      }

      .edit-handle.tl { top: -4px; left: -4px; }
      .edit-handle.tr { top: -4px; right: -4px; }
      .edit-handle.bl { bottom: -4px; left: -4px; }
      .edit-handle.br { bottom: -4px; right: -4px; }

      /* Edit panel */
      #edit-panel {
        display: none;
        position: fixed;
        bottom: 52px;
        right: 16px;
        width: 320px;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        padding: 16px;
        z-index: 30;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        font-size: 13px;
        max-height: calc(100vh - 120px);
        overflow-y: auto;
      }

      #edit-panel.visible {
        display: block;
      }

      .edit-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #0f3460;
      }

      .edit-panel-kind {
        color: #3b82f6;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
      }

      .edit-panel-name {
        color: #999;
        font-size: 11px;
        margin-top: 2px;
      }

      .edit-panel-id {
        color: #555;
        font-size: 10px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        margin-top: 2px;
        word-break: break-all;
      }

      .edit-panel-close {
        background: none;
        border: none;
        color: #666;
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }

      .edit-panel-close:hover {
        color: #e94560;
      }

      .edit-field-group {
        margin-bottom: 10px;
      }

      .edit-field-label {
        display: block;
        color: #888;
        font-size: 11px;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .edit-field-row {
        display: flex;
        gap: 8px;
      }

      .edit-field-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .edit-field-col label {
        color: #666;
        font-size: 10px;
      }

      .edit-field-col input {
        width: 100%;
        padding: 4px 8px;
        background: #1a1a2e;
        border: 1px solid #0f3460;
        border-radius: 4px;
        color: #e0e0e0;
        font-size: 12px;
        font-family: 'SF Mono', 'Fira Code', monospace;
      }

      .edit-field-col input:focus {
        outline: none;
        border-color: #3b82f6;
      }

      .edit-text-area {
        width: 100%;
        min-height: 60px;
        max-height: 120px;
        padding: 6px 8px;
        background: #1a1a2e;
        border: 1px solid #0f3460;
        border-radius: 4px;
        color: #e0e0e0;
        font-size: 12px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        resize: vertical;
      }

      .edit-text-area:focus {
        outline: none;
        border-color: #3b82f6;
      }

      .edit-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid #0f3460;
      }

      .edit-actions .btn {
        flex: 1;
        justify-content: center;
        padding: 6px 10px;
        font-size: 12px;
      }

      .btn-danger {
        background: #3d0000;
        border-color: #e94560;
        color: #ff8888;
      }

      .btn-danger:hover {
        background: #5a0000;
      }

      .btn-apply {
        background: #1e3a5f;
        border-color: #3b82f6;
        color: #93c5fd;
      }

      .btn-apply:hover {
        background: #2a4a70;
      }

      .edit-move-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 4px;
        max-width: 120px;
        margin: 0 auto;
      }

      .edit-move-grid .btn {
        padding: 4px;
        font-size: 14px;
        justify-content: center;
      }

      .edit-status {
        color: #666;
        font-size: 11px;
        text-align: center;
        margin-top: 8px;
      }

      /* Perf overlay badge */
      #perf-overlay {
        display: none;
        position: fixed;
        top: 56px;
        right: 16px;
        background: rgba(22, 33, 62, 0.92);
        border: 1px solid #0f3460;
        border-radius: 6px;
        padding: 6px 12px;
        z-index: 25;
        font-size: 12px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        color: #8ec;
        pointer-events: none;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      }

      #perf-overlay.visible {
        display: block;
      }

      /* Thumbnail sidebar */
      #thumbnail-sidebar {
        display: none;
        position: fixed;
        left: 0;
        top: 48px;
        bottom: 40px;
        width: 140px;
        background: #16213e;
        border-right: 1px solid #0f3460;
        overflow-y: auto;
        z-index: 15;
        padding: 8px;
        flex-direction: column;
        gap: 6px;
      }

      #thumbnail-sidebar.visible {
        display: flex;
      }

      #thumbnail-sidebar.visible ~ #drop-zone {
        margin-left: 140px;
      }

      .thumb-item {
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 4px;
        transition: border-color 0.15s;
        position: relative;
      }

      .thumb-item:hover {
        border-color: #0f3460;
      }

      .thumb-item.active {
        border-color: #e94560;
      }

      .thumb-item img {
        width: 100%;
        display: block;
        border-radius: 2px;
        background: #fff;
      }

      .thumb-num {
        position: absolute;
        bottom: 2px;
        left: 4px;
        font-size: 10px;
        color: #999;
        background: rgba(22, 33, 62, 0.8);
        padding: 0 4px;
        border-radius: 2px;
      }

      /* Format indicator badge */
      .format-badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border: 1px solid;
      }

      .format-badge.pptx {
        background: #1e3a5f;
        border-color: #3b82f6;
        color: #93c5fd;
      }

      .format-badge.pdf {
        background: #3d1a00;
        border-color: #e94560;
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OpenDocKit Viewer</h1>
      <div class="file-controls">
        <span id="format-badge" class="format-badge" style="display: none"></span>
        <button id="btn-thumbs" class="btn" title="Toggle slide thumbnail panel">Thumbs</button>
        <button id="btn-perf" class="btn" title="Toggle render time overlay">Perf</button>
        <button id="btn-inspect" class="btn btn-inspector" title="Toggle element inspector (click slides to inspect)">Inspect</button>
        <button id="btn-edit" class="btn btn-edit" title="Toggle edit mode (click elements to select and edit)">Edit</button>
        <button id="btn-save" class="btn" title="Download modified file" disabled>Save PPTX</button>
        <button id="btn-open" class="btn btn-primary">Open File</button>
        <input id="file-input" type="file" accept=".pptx,.pdf" />
        <span id="file-name" style="font-size: 13px; color: #999"></span>
      </div>
    </header>

    <div id="error-banner" class="error-banner"></div>

    <div id="drop-zone" class="empty">
      <div id="drop-overlay">Drop file here (PPTX or PDF)</div>

      <div id="empty-state" class="empty-state">
        <p>Load a PPTX or PDF file to begin</p>
        <p>Click "Open File" above or drag and drop a .pptx or .pdf file</p>
        <p class="hint">All pages render vertically -- just scroll</p>
      </div>

      <div id="slides-container"></div>
    </div>

    <!-- Edit panel (floating properties editor) -->
    <div id="edit-panel">
      <div class="edit-panel-header">
        <div>
          <div class="edit-panel-kind" id="edit-kind"></div>
          <div class="edit-panel-name" id="edit-name"></div>
          <div class="edit-panel-id" id="edit-id"></div>
        </div>
        <button class="edit-panel-close" id="edit-close" title="Deselect">&times;</button>
      </div>

      <div class="edit-field-group">
        <span class="edit-field-label">Position (inches)</span>
        <div class="edit-field-row">
          <div class="edit-field-col">
            <label>X</label>
            <input type="number" id="edit-x" step="0.1" />
          </div>
          <div class="edit-field-col">
            <label>Y</label>
            <input type="number" id="edit-y" step="0.1" />
          </div>
        </div>
      </div>

      <div class="edit-field-group">
        <span class="edit-field-label">Size (inches)</span>
        <div class="edit-field-row">
          <div class="edit-field-col">
            <label>W</label>
            <input type="number" id="edit-w" step="0.1" min="0.1" />
          </div>
          <div class="edit-field-col">
            <label>H</label>
            <input type="number" id="edit-h" step="0.1" min="0.1" />
          </div>
        </div>
      </div>

      <div class="edit-field-group">
        <span class="edit-field-label">Nudge</span>
        <div class="edit-move-grid">
          <span></span>
          <button class="btn" id="edit-nudge-up" title="Move up">&#9650;</button>
          <span></span>
          <button class="btn" id="edit-nudge-left" title="Move left">&#9664;</button>
          <button class="btn" id="edit-nudge-center" title="Center on slide">&#9678;</button>
          <button class="btn" id="edit-nudge-right" title="Move right">&#9654;</button>
          <span></span>
          <button class="btn" id="edit-nudge-down" title="Move down">&#9660;</button>
          <span></span>
        </div>
      </div>

      <div class="edit-field-group" id="edit-text-group" style="display: none">
        <span class="edit-field-label">Text</span>
        <textarea class="edit-text-area" id="edit-text"></textarea>
      </div>

      <div class="edit-actions">
        <button class="btn btn-danger" id="edit-delete">Delete</button>
        <button class="btn btn-apply" id="edit-apply">Apply Changes</button>
      </div>

      <div class="edit-status" id="edit-status"></div>
    </div>

    <!-- Thumbnail sidebar -->
    <div id="thumbnail-sidebar"></div>

    <!-- Perf overlay badge -->
    <div id="perf-overlay"></div>

    <footer>
      <span id="loading" class="loading-indicator">
        <span class="spinner"></span>
        <span id="loading-msg">Loading...</span>
      </span>

      <span id="status"></span>
      <span id="slide-info" class="slide-info"></span>
    </footer>

    <script type="module" src="./viewer.ts"></script>
  </body>
</html>
